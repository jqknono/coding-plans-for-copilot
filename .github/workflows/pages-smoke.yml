name: GitHub Pages Smoke Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  smoke-test:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start local Pages preview
        run: |
          npm run serve:page > serve-page.log 2>&1 &
          echo $! > serve-page.pid

      - name: Wait for preview server
        run: |
          for i in {1..60}; do
            if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo 'Local Pages preview did not become ready in time.'
          cat serve-page.log || true
          exit 1

      - name: Run GitHub Pages smoke tests
        run: npm run test:pages

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: github-pages-smoke-report
          path: |
            output/playwright
            serve-page.log
          if-no-files-found: ignore
