name: Update OpenRouter Provider Metrics

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  update-openrouter-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch OpenRouter provider metrics
        env:
          CODING_PLANS_FOR_COPILOT: ${{ secrets.CODING_PLANS_FOR_COPILOT }}
          OPENROUTER_MODEL_ORGS: ${{ vars.OPENROUTER_MODEL_ORGS || 'deepseek,qwen,moonshotai,z-ai,minimax,bytedance,bytedance-seed,kwaipilot,meituan,mistralai,stepfun' }}
          OPENROUTER_MODEL_LIMIT: ${{ vars.OPENROUTER_MODEL_LIMIT || '5' }}
          OPENROUTER_MODEL_MAX_AGE_DAYS: ${{ vars.OPENROUTER_MODEL_MAX_AGE_DAYS || '180' }}
        run: npm run metrics:fetch

      - name: Fetch OpenRouter provider plans
        env:
          CODING_PLANS_FOR_COPILOT: ${{ secrets.CODING_PLANS_FOR_COPILOT }}
        run: npm run openrouter:plans:fetch

      - name: Commit metrics changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/openrouter-provider-metrics.json assets/openrouter-provider-plans.json
          if git diff --cached --quiet; then
            echo "No metrics changes detected."
            exit 0
          fi
          git commit -m "chore: update openrouter provider metrics"
          BRANCH_NAME="${GITHUB_REF_NAME:-main}"
          git push origin "HEAD:${BRANCH_NAME}"
